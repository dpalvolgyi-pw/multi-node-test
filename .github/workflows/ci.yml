name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Mise
        uses: jdx/mise-action@v3
        with:
          install: true
          install_args: node@14.21.3

      - name: Install yarn
        run: mise x node@14 -- corepack enable

      - name: Cache Yarn packages
        uses: actions/cache@v3
        id: yarn-cache  # Use this ID to check cache status later
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}  # Cache key based on OS + yarn.lock hash
          restore-keys: |
            ${{ runner.os }}-yarn-  # Fallback key if exact match not found

      - name: Install dependencies
        run: mise x node@14 -- yarn install --immutable

      - name: Build
        run: mise x node@14 -- yarn build

      - name: Run app and verify output
        run: |
          output=$(mise x node@14 -- yarn start --silent)
          echo "Output: $output"
          echo "$output" | grep -E "^Node version: v[0-9]+\.[0-9]+\.[0-9]+" || (echo "Unexpected output: $output" && exit 1)
